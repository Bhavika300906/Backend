{% load static %}
<!DOCTYPE html>
<html>

<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Delete Profile</title>
    <link rel="stylesheet" href="{% static 'profile_app/styles.css' %}?v=5">
</head>

<body>
    <main class="page">
        <nav class="topbar">
            <div class="brand">
                <span class="brand-mark">SP</span>
                <span>Social Profiles</span>
            </div>
        </nav>

        <section class="panel">
            <div class="panel-header">
                <div>
                    <h1>Delete Profile</h1>
                    <p class="subtitle">This action will permanently remove {{ profile.username }}.</p>
                </div>
            </div>

            <div class="content">
                <div class="confirm-box">
                    <p class="confirm-title">Are you sure you want to delete this profile?</p>
                    <p class="profile-meta">Username: {{ profile.username }} | Age: {{ profile.age }}</p>

                    <form method="POST" class="confirm-actions">
                        {% csrf_token %}
                        <a class="button secondary" href="{% url 'profile_list' %}">Cancel</a>
                        <button class="danger-button" type="submit">Delete Profile</button>
                    </form>
                </div>
            </div>
        </section>
    </main>
</body>

</html>
