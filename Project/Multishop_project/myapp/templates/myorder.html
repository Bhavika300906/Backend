{% extends 'header.html' %}

{% load static %}

{% block content%}

<!DOCTYPE html>
<html lang="en">

<head>
    <script src="https://js.stripe.com/v3/"></script>
</head>

<body>

    <!-- Breadcrumb Start -->
    <div class="container-fluid">
        <div class="row px-xl-5">
            <div class="col-12">
                <nav class="breadcrumb bg-light mb-30">
                    <a class="breadcrumb-item text-dark" href="/">Home</a>
                    <a class="breadcrumb-item text-dark" href="#">Shop</a>
                    <span class="breadcrumb-item active">My Orders</span>
                </nav>
            </div>
        </div>
    </div>
    <!-- Breadcrumb End -->


    <!-- Cart Start -->
    <div class="container-fluid">
        <div class="row px-xl-5">
            <div class="col-lg-8 table-responsive mb-5">
                <table class="table table-light table-borderless table-hover text-center mb-0">
                    <thead class="thead-dark">
                        <tr>
                            <th>Products</th>
                            <th>Price</th>
                            <th>Quantity</th>
                            <th>Total</th>
                            <th>Remove</th>
                        </tr>
                    </thead>
                    <tbody class="align-middle">
                        {% for i in orders %}
                        <tr>
                            <td class="align-middle"><img src="{{i.product.product_image.url}}" alt=""
                                    style="width: 50px;"> {{i.product.product_name}} </td>
                            <td class="align-middle">₹ {{i.product_price}}</td>
                            <td class="align-middle">
                                <div class="input-group quantity mx-auto" style="width: 100px;">
                                    <form name="change-qty" method="post" action="{% url 'change-qty' pk=i.pk %}">
                                        {% csrf_token %}
                                        <input type="number"
                                            class="form-control form-control-sm bg-secondary border-0 text-center"
                                            value="{{i.product_qty}}" name="product_qty" min="1" max="10"
                                            onchange="this.form.submit();" readonly>
                                    </form>
                                </div>
                            </td>
                            <td class="align-middle">₹ {{i.total_price}}</td>
                            
                        </tr>
                        {% endfor %}
                    </tbody>
                </table>
            </div>
            <div class="col-lg-4">

                <h5 class="section-title position-relative text-uppercase mb-3"><span class="bg-secondary pr-3">Cart
                        Summary</span></h5>
                <div class="bg-light p-30 mb-5">

                    <div class="pt-2">
                        <div class="d-flex justify-content-between mt-2">
                            <h5>Total</h5>
                            <h5>₹ {{net_price}}</h5>
                        </div>
                        
                    </div>
                </div>
            </div>
        </div>
    </div>
    <!-- Cart End -->

</body>

</html>
{% endblock %}
