{% extends 'seller-header.html' %}

{% load static %}

{% block content%}

<!DOCTYPE html>
<html lang="en">

<head>
</head>

<body>
    <!-- Breadcrumb Start -->
    <div class="container-fluid">
        <div class="row px-xl-5">
            <div class="col-12">
                <nav class="breadcrumb bg-light mb-30">
                    <a class="breadcrumb-item text-dark" href="/">Home</a>

                    <span class="breadcrumb-item active">Product Detail</span>
                </nav>
            </div>
        </div>
    </div>
    <!-- Breadcrumb End -->

    <!-- Shop Detail Start -->
    <div class="container-fluid pb-5">
        <div class="row px-xl-5">
            <div class="col-lg-5 mb-30">
                <div id="product-carousel" class="carousel slide" data-ride="carousel">
                    <div class="carousel-inner bg-light">
                        <div class="carousel-item active">
                            <img class="w-100 h-100" src="{{product.product_image.url}}" alt="Image">
                        </div>
                    </div>
                </div>
            </div>

            <div class="col-lg-7 h-auto mb-30">
                <div class="h-100 bg-light p-30">
                    <h3>{{product.product_name}}</h3>

                    <h3 class="font-weight-semi-bold mb-4">₹ {{product.product_price}}</h3>
                    <p class="mb-4">{{product.product_decs}}</p>
                    <div class="d-flex align-items-center mb-4 pt-2">
                        <a href="{% url 'seller-product-edit' pk=product.pk %}"><button class="btn btn-primary px-5"></i> Edit </button></a> &nbsp;&nbsp;&nbsp;
                        <a href="{% url 'seller-product-delete' pk=product.pk %}"><button class="btn btn-primary px-5"></i> Delete </button></a>
                    </div>

                </div>
            </div>
        </div>

    </div>
    <!-- Shop Detail End -->

</body>

</html>
{% endblock %}
