{% extends 'header.html' %}

{% load static %}

{% block content%}

<!DOCTYPE html>
<html lang="en">

<head>
</head>

<body>

    <!-- Breadcrumb Start -->
    <div class="container-fluid">
        <div class="row px-xl-5">
            <div class="col-12">
                <nav class="breadcrumb bg-light mb-30">
                    <a class="breadcrumb-item text-dark" href="/">Home</a>
                    <span class="breadcrumb-item active">Sign Up</span>
                </nav>
            </div>
        </div>
    </div>
    <!-- Breadcrumb End -->


    <!-- Contact Start -->
    <div class="container-fluid">
        <h2 class="section-title position-relative text-uppercase mx-xl-5 mb-4"><span class="bg-secondary pr-3">Sign
                UP</span></h2>
        <div class="row px-xl-5">
            <div class="col-lg-12 mb-5">
                <div class="contact-form bg-light p-30">
                    <div id="success"></div>
                    {% if msg %}
                    <b style="color: blue;">{{msg}}</b>
                    {% endif %}
                    <form name="sentMessage" method="POST" action="{% url 'signup'%}" enctype="multipart/form-data">
                        {% csrf_token %}
                        <div class="control-group">
                           <select name="usertype" class="form-control" id="name">
                            <option>-----SELECT Usertype----</option>
                            <option value="Buyer">-----Buyer-----</option>
                            <option value="Seller">-----Seller-----</option>
                           </select>
                           <p class="help-block text-danger"></p>
                        </div>
                        <div class="control-group">
                            <input type="text" class="form-control" id="name" placeholder=" First Name"
                                required="required" name="fname" />
                            <p class="help-block text-danger"></p>
                        </div>
                        <div class="control-group">
                            <input type="text" class="form-control" id="name" placeholder=" Last Name"
                                required="required" name="lname" />
                            <p class="help-block text-danger"></p>
                        </div>
                        <div class="control-group">
                            <input type="email" class="form-control" id="email" placeholder=" Email"
                                required="required" name="email" />
                            <p class="help-block text-danger"></p>
                        </div>
                        <div class="control-group">
                            <input type="text" class="form-control" id="name" placeholder="Mobile" required="required"
                                name="mobile" />
                            <p class="help-block text-danger"></p>
                        </div>
                        <div class="control-group">
                            <textarea type="text" class="form-control" id="name" placeholder="Address"
                                required="required" name="address"></textarea>
                            <p class="help-block text-danger"></p>
                        </div>
                         <div class="control-group">
                            <input type="password" class="form-control" id="name" placeholder="Password"
                                required="required" name="password"/>
                            <p class="help-block text-danger"></p>
                        </div>
                         <div class="control-group">
                            <input type="password" class="form-control" id="name" placeholder="Confirm Password"
                                required="required" name="cpassword"/>
                            <p class="help-block text-danger"></p>
                        </div>
                         <div class="control-group">
                            <input type="file" class="form-control" id="name" name="profile_picture"/>
                            <p class="help-block text-danger"></p>
                        </div>

                        <div>
                            <button class="btn btn-primary py-2 px-4" type="submit" id="sendMessageButton">Sign
                                Up</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
    <!-- Contact End -->

</body>

</html>
{% endblock %}
